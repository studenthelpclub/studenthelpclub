    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; }
        .article-card { transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid #f3f4f6; }
        .article-card:hover { transform: translateY(-8px); border-color: #d32f2f; box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .content-area h2 { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin: 2.5rem 0 1.25rem; border-left: 4px solid #d32f2f; padding-left: 15px; font-style: italic; text-transform: uppercase; }
        .content-area p { margin-bottom: 1.5rem; line-height: 1.9; color: #475569; font-size: 15px; }
        .content-area ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; }
        .hidden { display: none !important; }
        #loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="loader"><i class="fas fa-circle-notch fa-spin text-4xl text-[#d32f2f]"></i></div>

    <nav class="bg-white/80 backdrop-blur-md border-b px-6 py-5 sticky top-0 z-[1000]">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-[#d32f2f] font-black uppercase text-xs"><i class="fas fa-arrow-left"></i> Back to Store</a>
            <h1 class="text-lg font-black italic text-slate-800 uppercase tracking-tighter">Knowledge Hub</h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div id="blogListView">
            <div class="mb-16 text-center md:text-left">
                <h2 class="text-4xl font-black italic uppercase text-slate-800 mb-3">Student <span class="text-[#d32f2f]">Resources</span></h2>
                <p class="text-gray-500 text-sm font-medium">Authentic IGNOU guides, updates, and study material.</p>
            </div>
            <div id="articleGrid" class="grid grid-cols-1 gap-8"></div>
        </div>

        <div id="fullArticleView" class="hidden">
            <button onclick="window.location.href='blog.html'" class="mb-10 text-slate-400 font-black uppercase text-[10px] flex items-center gap-2 hover:text-[#d32f2f]">
                <i class="fas fa-long-arrow-alt-left text-lg"></i> Back to All Articles
            </button>
            <div id="articleHeader"></div>
            <div id="articleBody" class="content-area mt-10 border-t pt-10"></div>
        </div>
    </main>

    <footer class="bg-slate-900 py-16 mt-20 text-center">
        <div class="max-w-5xl mx-auto px-6">
            <h3 class="text-white font-black italic uppercase text-xl mb-4">Student Help Club</h3>
            <p class="text-[9px] font-medium uppercase tracking-[0.3em] text-gray-500">© 2026 Student Help Club | Founder: Vishal Kumar</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADB27lDGXm0g52dEErHUpPse-omSH1pA8",
            authDomain: "ignou-web.firebaseapp.com",
            projectId: "ignou-web",
            storageBucket: "ignou-web.firebasestorage.app",
            messagingSenderId: "854950506403",
            appId: "1:854950506403:web:941a56126a36fd3f9d7416"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allArticles = [];

        async function fetchArticles() {
            const grid = document.getElementById('articleGrid');
            const loader = document.getElementById('loader');
            try {
                const snap = await getDocs(collection(db, "articles"));
                if (snap.empty) {
                    grid.innerHTML = `<div class="text-center py-20 text-gray-400">Database mein koi article nahi mila. Admin panel se check karein.</div>`;
                } else {
                    allArticles = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // FIX: Sorting by timestamp with fallback for old articles
                    allArticles.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    renderList();
                    checkURL();
                }
            } catch (e) {
                grid.innerHTML = `<div class="text-center py-20 text-red-500">Error loading articles. Firestore rules check karein.</div>`;
                console.error(e);
            }
            loader.classList.add('hidden');
        }

        function renderList() {
            const grid = document.getElementById('articleGrid');
            grid.innerHTML = allArticles.map(art => `
                <div class="article-card bg-white p-8 rounded-[3rem] shadow-sm flex flex-col md:flex-row gap-8 items-center" onclick="openArticle('${art.id}')">
                    <div class="w-20 h-20 bg-red-50 rounded-3xl flex items-center justify-center text-[#d32f2f] text-3xl flex-shrink-0"><i class="fas fa-file-alt"></i></div>
                    <div class="flex-1 text-center md:text-left">
                        <span class="text-[9px] font-black text-[#d32f2f] uppercase tracking-[0.2em] bg-red-50 px-3 py-1 rounded-full">${art.category || 'Updates'}</span>
                        <h3 class="text-xl md:text-2xl font-black text-slate-800 uppercase italic mt-3 mb-2">${art.title}</h3>
                        <p class="text-gray-400 text-xs line-clamp-2">${art.shortDesc || 'Sahi guide padhne ke liye click karein...'}</p>
                    </div>
                </div>
            `).join('');
        }

        window.openArticle = (id) => {
            const art = allArticles.find(a => a.id === id);
            if(!art) return;
            document.title = `${art.title} | Student Help Club`;
            document.getElementById('meta-desc').setAttribute("content", art.shortDesc || art.title);
            
            document.getElementById('articleHeader').innerHTML = `
                <div class="text-center md:text-left">
                    <span class="text-[10px] font-black text-[#d32f2f] uppercase tracking-[0.3em] bg-red-50 px-4 py-1.5 rounded-full">${art.category}</span>
                    <h1 class="text-3xl md:text-5xl font-black text-slate-800 uppercase italic mt-6 mb-6 leading-[1.1]">${art.title}</h1>
                    <div class="flex items-center justify-center md:justify-start gap-4 text-gray-400 text-[10px] font-bold uppercase italic">
                        <span>By Vishal Kumar</span><span class="w-1.5 h-1.5 bg-gray-200 rounded-full"></span><span>${art.date || 'Latest'}</span>
                    </div>
                </div>
            `;
            document.getElementById('articleBody').innerHTML = art.content;
            document.getElementById('blogListView').classList.add('hidden');
            document.getElementById('fullArticleView').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            window.history.pushState({}, '', `?id=${id}`);
        };

        function checkURL() {
            const id = new URLSearchParams(window.location.search).get('id');
            if(id) openArticle(id);
        }
        fetchArticles();
    </script>
</body>
</html>

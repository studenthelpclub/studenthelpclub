<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-7332493779076670">
    
    <title id="page-title">Important Updates | Student Help Club</title>
    <meta name="description" id="meta-desc" content="Latest IGNOU guides and official updates by Student Help Club.">
    <meta name="author" content="Vishal Kumar - Student Help Club">
    <link rel="canonical" href="https://studenthelpclub.in/blog.html" />

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7332493779076670" crossorigin="anonymous"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; scroll-behavior: smooth; }
        .article-card { transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid #eee; background: white; }
        .article-card:hover { transform: translateY(-8px); border-color: #d32f2f; box-shadow: 0 20px 30px rgba(0,0,0,0.05); }
        
        .content-area h2 { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin-top: 2.5rem; margin-bottom: 1.25rem; text-transform: uppercase; font-style: italic; border-left: 4px solid #d32f2f; padding-left: 15px; }
        .content-area p { margin-bottom: 1.5rem; line-height: 1.9; color: #475569; font-size: 15px; }
        
        .hidden { display: none !important; }
        #loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .hidden-loader { display: none !important; }

        /* Comment Styling */
        .comment-input { border: 2px solid #f1f5f9; transition: 0.3s; }
        .comment-input:focus { border-color: #d32f2f; outline: none; background: white; }
        .user-avatar { width: 40px; height: 40px; background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #64748b; font-weight: 800; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-circle-notch fa-spin text-4xl text-[#d32f2f]"></i></div>

    <nav class="bg-white/80 backdrop-blur-md border-b px-6 py-5 sticky top-0 z-[1000]">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-[#d32f2f] font-black uppercase text-xs hover:opacity-70 transition">
                <i class="fas fa-arrow-left"></i> Back to Store
            </a>
            <h1 class="text-lg font-black italic text-slate-800 uppercase tracking-tighter">Important Updates</h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div id="blogListView">
            <div class="mb-16 text-center md:text-left">
                <h2 class="text-4xl font-black italic uppercase text-slate-800 mb-3">Important <span class="text-[#d32f2f]">Updates</span></h2>
                <p class="text-gray-500 text-sm font-medium italic">Latest IGNOU official news and student guides.</p>
            </div>
            <div id="articleGrid" class="grid grid-cols-1 gap-8"></div>
        </div>

        <div id="fullArticleView" class="hidden">
            <button onclick="window.location.href='blog.html'" class="mb-10 text-slate-400 font-black uppercase text-[10px] flex items-center gap-2 hover:text-[#d32f2f] transition-all">
                <i class="fas fa-long-arrow-alt-left text-lg"></i> Back to All Updates
            </button>
            <div id="articleHeader"></div>
            <div id="articleBody" class="content-area mt-10 border-t pt-10"></div>

            <div class="mt-20 pt-10 border-t border-dashed border-slate-200">
                <h3 class="text-xl font-black italic uppercase text-slate-800 mb-8"><i class="fas fa-comments text-[#d32f2f] mr-2"></i> Student Discussion</h3>
                
                <div class="bg-slate-50 p-6 md:p-8 rounded-[2.5rem] mb-12">
                    <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-6">Leave a comment</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <input type="text" id="comm-name" placeholder="Your Name" class="comment-input bg-white p-4 rounded-2xl text-sm font-bold">
                        <div class="hidden md:block"></div>
                        <textarea id="comm-text" rows="3" placeholder="Write your question or feedback..." class="comment-input bg-white p-4 rounded-2xl text-sm font-medium md:col-span-2"></textarea>
                    </div>
                    <button onclick="submitComment()" id="commBtn" class="bg-slate-800 hover:bg-[#d32f2f] text-white px-8 py-3.5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all">Post Comment</button>
                </div>

                <div id="commentList" class="space-y-6">
                    </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 py-16 mt-20 text-center">
        <div class="max-w-5xl mx-auto px-6">
            <p class="text-[9px] text-gray-600 uppercase tracking-[0.2em]">© 2026 Student Help Club | Vishal Kumar</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, serverTimestamp, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADB27lDGXm0g52dEErHUpPse-omSH1pA8",
            authDomain: "ignou-web.firebaseapp.com",
            projectId: "ignou-web",
            storageBucket: "ignou-web.firebasestorage.app",
            messagingSenderId: "854950506403",
            appId: "1:854950506403:web:941a56126a36fd3f9d7416"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allArticles = [];
        let currentArticleId = null;

        // Fetch All Articles
        async function fetchArticles() {
            const grid = document.getElementById('articleGrid');
            const loader = document.getElementById('loader');
            try {
                const snap = await getDocs(collection(db, "articles"));
                if (snap.empty) {
                    grid.innerHTML = `<div class="text-center py-20 text-gray-400">No updates found.</div>`;
                } else {
                    allArticles = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    allArticles.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    renderList();
                    checkURL();
                }
            } catch (e) { console.error(e); }
            loader.classList.add('hidden-loader');
        }

        function renderList() {
            const grid = document.getElementById('articleGrid');
            grid.innerHTML = allArticles.map(art => `
                <div class="article-card p-8 rounded-[3rem] flex flex-col md:flex-row gap-8 items-center" onclick="openArticle('${art.id}')">
                    <div class="w-16 h-16 bg-red-50 rounded-2xl flex items-center justify-center text-[#d32f2f] text-2xl flex-shrink-0"><i class="fas fa-bell"></i></div>
                    <div class="flex-1 text-center md:text-left">
                        <span class="text-[9px] font-black text-[#d32f2f] uppercase tracking-[0.2em] bg-red-50 px-3 py-1 rounded-full">${art.category || 'Update'}</span>
                        <h3 class="text-xl font-black text-slate-800 uppercase italic mt-3 mb-2 leading-tight">${art.title}</h3>
                        <p class="text-gray-400 text-xs line-clamp-2">${art.shortDesc || 'Click to read details...'}</p>
                    </div>
                </div>
            `).join('');
        }

        window.openArticle = (id) => {
            const art = allArticles.find(a => a.id === id);
            if(!art) return;
            currentArticleId = id;

            document.getElementById('articleHeader').innerHTML = `
                <div class="text-center md:text-left">
                    <span class="text-[10px] font-black text-[#d32f2f] uppercase tracking-[0.3em] bg-red-50 px-4 py-1.5 rounded-full">${art.category}</span>
                    <h1 class="text-3xl md:text-5xl font-black text-slate-800 uppercase italic mt-6 mb-6 leading-[1.1]">${art.title}</h1>
                    <div class="text-gray-400 text-[10px] font-bold uppercase italic">By SHC Admin • ${art.date || 'Latest'}</div>
                </div>
            `;
            document.getElementById('articleBody').innerHTML = art.content;
            document.getElementById('blogListView').classList.add('hidden');
            document.getElementById('fullArticleView').classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            window.history.pushState({}, '', `?id=${id}`);
            
            loadComments(id); // Load comments for this specific article
        };

        // --- Comment Logic ---

        window.submitComment = async () => {
            const name = document.getElementById('comm-name').value.trim();
            const text = document.getElementById('comm-text').value.trim();
            const btn = document.getElementById('commBtn');

            if(!name || !text) return alert("Please enter your name and comment.");

            btn.disabled = true;
            btn.innerText = "POSTING...";

            try {
                await addDoc(collection(db, "comments"), {
                    articleId: currentArticleId,
                    name: name,
                    text: text,
                    timestamp: serverTimestamp()
                });
                document.getElementById('comm-name').value = '';
                document.getElementById('comm-text').value = '';
                alert("Comment posted successfully!");
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Post Comment";
            }
        };

        function loadComments(articleId) {
            const commList = document.getElementById('commentList');
            const q = query(collection(db, "comments"), where("articleId", "==", articleId), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snapshot) => {
                if (snapshot.empty) {
                    commList.innerHTML = `<p class="text-slate-400 text-xs italic font-medium">No comments yet. Be the first to ask!</p>`;
                    return;
                }
                commList.innerHTML = snapshot.docs.map(doc => {
                    const data = doc.data();
                    const initial = data.name.charAt(0).toUpperCase();
                    return `
                        <div class="flex gap-4 p-4 rounded-3xl bg-white border border-slate-100 shadow-sm">
                            <div class="user-avatar flex-shrink-0">${initial}</div>
                            <div>
                                <h4 class="text-xs font-black text-slate-800 uppercase mb-1">${data.name}</h4>
                                <p class="text-sm text-slate-600 leading-relaxed font-medium">${data.text}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        function checkURL() {
            const id = new URLSearchParams(window.location.search).get('id');
            if(id) openArticle(id);
        }

        fetchArticles();
    </script>
</body>
</html>

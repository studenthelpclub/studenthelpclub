<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-7332493779076670">
    
    <title id="page-title">Important Update | Student Help Club</title>
    <meta name="description" id="meta-desc" content="Latest IGNOU guides, solved assignments, and Important Updates by Student Help Club.">
    <meta name="author" content="Vishal Kumar - Student Help Club">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://studenthelpclub.in/blog.html" />

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WKEZF1XEMF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WKEZF1XEMF');
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7332493779076670" crossorigin="anonymous"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; scroll-behavior: smooth; }
        .article-card { transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid #f1f5f9; background: white; }
        .article-card:hover { transform: translateY(-8px); border-color: #d32f2f; box-shadow: 0 20px 30px rgba(0,0,0,0.05); }
        .content-area h2 { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin-top: 2.5rem; margin-bottom: 1.25rem; text-transform: uppercase; font-style: italic; border-left: 4px solid #d32f2f; padding-left: 15px; }
        .content-area p { margin-bottom: 1.5rem; line-height: 1.9; color: #475569; font-size: 15px; }
        .hidden { display: none !important; }
        #loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .comment-box { background: #f8fafc; border-radius: 2rem; padding: 2rem; margin-top: 3rem; border: 1px solid #e2e8f0; }
        .user-avatar { width: 40px; height: 40px; background: #d32f2f; color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-spinner fa-spin text-4xl text-[#d32f2f]"></i></div>

    <nav class="bg-white/80 backdrop-blur-md border-b px-6 py-5 sticky top-0 z-[1000]">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-[#d32f2f] font-black uppercase text-xs flex items-center gap-2"><i class="fas fa-arrow-left"></i> Store</a>
            <h1 class="text-lg font-black italic text-slate-800 uppercase">Important Update</h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div id="blogListView">
            <div class="mb-12">
                <h2 class="text-4xl font-black italic uppercase text-slate-800">Latest <span class="text-[#d32f2f]">News</span></h2>
                <p class="text-gray-500 text-sm font-medium italic">Sahi jankari, sahi samay par.</p>
            </div>
            <div id="articleGrid" class="grid grid-cols-1 gap-6"></div>
        </div>

        <div id="fullArticleView" class="hidden">
            <button onclick="window.location.reload()" class="mb-8 text-slate-400 font-black uppercase text-[10px] flex items-center gap-2 hover:text-[#d32f2f]"><i class="fas fa-long-arrow-alt-left text-lg"></i> Back to Updates</button>
            <div id="articleHeader"></div>
            <div id="articleBody" class="content-area mt-8 border-t pt-8"></div>

            <div class="comment-box">
                <h3 class="text-lg font-black uppercase italic mb-6 text-slate-800">Student Discussion</h3>
                <div class="space-y-4 mb-8">
                    <input type="text" id="comm-name" placeholder="Apna Naam Likhen" class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-[#d32f2f] text-sm font-bold">
                    <textarea id="comm-text" rows="3" placeholder="Sawal ya feedback poochhen..." class="w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-[#d32f2f] text-sm font-medium"></textarea>
                    <button onclick="postComment()" id="commBtn" class="bg-slate-800 hover:bg-[#d32f2f] text-white px-8 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all">Post Comment</button>
                </div>
                <div id="commentList" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 py-12 mt-20 text-center text-gray-500">
        <p class="text-[9px] uppercase tracking-[0.2em]">© 2026 Student Help Club | Vishal Kumar</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, serverTimestamp, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADB27lDGXm0g52dEErHUpPse-omSH1pA8",
            authDomain: "ignou-web.firebaseapp.com",
            projectId: "ignou-web",
            storageBucket: "ignou-web.firebasestorage.app",
            messagingSenderId: "854950506403",
            appId: "1:854950506403:web:941a56126a36fd3f9d7416"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allArticles = [];
        let activeArtId = "";

        async function loadData() {
            const grid = document.getElementById('articleGrid');
            try {
                const snap = await getDocs(collection(db, "articles"));
                if (snap.empty) {
                    grid.innerHTML = `<div class="text-center py-20 text-gray-400 font-bold uppercase text-xs">No updates found in database.</div>`;
                } else {
                    allArticles = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    // Local Sorting: Bina timestamp waale docs bhi load honge
                    allArticles.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    
                    renderGrid();
                    checkUrl();
                }
            } catch (err) {
                console.error(err);
                grid.innerHTML = `<div class="text-center py-20 text-red-400 font-bold uppercase text-xs">Error loading data. Check Firestore Rules.</div>`;
            }
            document.getElementById('loader').classList.add('hidden');
        }

        function renderGrid() {
            const grid = document.getElementById('articleGrid');
            grid.innerHTML = allArticles.map(art => `
                <div class="article-card p-6 rounded-[2rem] flex flex-col md:flex-row gap-6 items-center" onclick="openFull('${art.id}')">
                    <div class="w-14 h-14 bg-red-50 text-[#d32f2f] rounded-2xl flex items-center justify-center text-xl flex-shrink-0"><i class="fas fa-bolt"></i></div>
                    <div class="flex-1 text-center md:text-left">
                        <span class="text-[8px] font-black text-[#d32f2f] uppercase tracking-widest bg-red-50 px-3 py-1 rounded-full">${art.category || 'News'}</span>
                        <h3 class="text-lg md:text-xl font-black text-slate-800 uppercase italic mt-2">${art.title}</h3>
                        <p class="text-gray-400 text-[11px] line-clamp-1 mt-1">${art.shortDesc || 'Poori jankari ke liye click karein...'}</p>
                    </div>
                </div>
            `).join('');
        }

        window.openFull = (id) => {
            const art = allArticles.find(a => a.id === id);
            if(!art) return;
            activeArtId = id;

            document.getElementById('articleHeader').innerHTML = `
                <span class="text-[10px] font-black text-[#d32f2f] uppercase tracking-widest bg-red-50 px-4 py-1.5 rounded-full">${art.category}</span>
                <h1 class="text-3xl md:text-5xl font-black text-slate-800 uppercase italic mt-6 leading-tight">${art.title}</h1>
                <div class="text-gray-400 text-[10px] font-bold uppercase italic mt-4">Published on: ${art.date || 'Latest'}</div>
            `;
            document.getElementById('articleBody').innerHTML = art.content;
            document.getElementById('blogListView').classList.add('hidden');
            document.getElementById('fullArticleView').classList.remove('hidden');
            window.scrollTo(0,0);
            window.history.pushState({}, '', `?id=${id}`);
            loadComments(id);
        };

        // --- Comments Logic ---
        window.postComment = async () => {
            const name = document.getElementById('comm-name').value.trim();
            const text = document.getElementById('comm-text').value.trim();
            if(!name || !text) return alert("Bhai, naam aur comment dono likho!");

            const btn = document.getElementById('commBtn');
            btn.disabled = true; btn.innerText = "POSTING...";

            try {
                await addDoc(collection(db, "comments"), {
                    articleId: activeArtId,
                    name: name,
                    text: text,
                    timestamp: serverTimestamp()
                });
                document.getElementById('comm-name').value = "";
                document.getElementById('comm-text').value = "";
            } catch (e) { alert(e.message); }
            btn.disabled = false; btn.innerText = "Post Comment";
        };

        function loadComments(artId) {
            const list = document.getElementById('commentList');
            const q = query(collection(db, "comments"), where("articleId", "==", artId), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snap) => {
                if (snap.empty) {
                    list.innerHTML = `<p class="text-gray-400 text-[10px] italic">No comments yet. Sawal poochhne wale pehle student banein!</p>`;
                    return;
                }
                list.innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    return `
                        <div class="flex gap-4 p-4 bg-white rounded-2xl border border-slate-100 shadow-sm">
                            <div class="user-avatar flex-shrink-0">${d.name.charAt(0).toUpperCase()}</div>
                            <div>
                                <h4 class="text-[10px] font-black text-slate-800 uppercase">${d.name}</h4>
                                <p class="text-xs text-slate-500 font-medium mt-1">${d.text}</p>
                            </div>
                        </div>`;
                }).join('');
            });
        }

        function checkUrl() {
            const id = new URLSearchParams(window.location.search).get('id');
            if(id) openFull(id);
        }

        loadData();
    </script>
</body>
</html>

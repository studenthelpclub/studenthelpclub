<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-7332493779076670">
    <title id="page-title">Important Updates | Student Help Club</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WKEZF1XEMF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WKEZF1XEMF');
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7332493779076670" crossorigin="anonymous"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        html, body { height: 100%; margin: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; display: flex; flex-direction: column; }
        main { flex: 1 0 auto; }
        footer { flex-shrink: 0; }
        .article-card { transition: 0.3s; cursor: pointer; border: 1px solid #f1f5f9; background: white; border-radius: 1.5rem; }
        .article-card:hover { transform: translateY(-5px); border-color: #d32f2f; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .content-area h2 { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin-top: 2rem; border-left: 4px solid #d32f2f; padding-left: 15px; }
        #loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fas fa-circle-notch fa-spin text-3xl text-[#d32f2f] mb-4"></i>
        <p id="loader-text" class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Connecting to Database...</p>
    </div>

    <nav class="bg-white/80 backdrop-blur-md border-b px-6 py-4 sticky top-0 z-[1000]">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-[#d32f2f] font-black uppercase text-xs flex items-center gap-2"><i class="fas fa-arrow-left"></i> Store</a>
            <h1 class="text-sm font-black italic text-slate-800 uppercase">Student Help Club</h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-10 w-full">
        <div id="blogListView">
            <div class="mb-10 text-center md:text-left">
                <h2 class="text-3xl font-black italic uppercase text-slate-800">Latest <span class="text-[#d32f2f]">News</span></h2>
                <p class="text-gray-500 text-xs font-medium italic">Sahi jankari, sahi samay par.</p>
            </div>
            <div id="articleGrid" class="grid grid-cols-1 gap-5"></div>
        </div>

        <div id="fullArticleView" class="hidden pb-20">
            <button onclick="window.location.href='blog.html'" class="mb-6 text-slate-400 font-bold uppercase text-[9px] flex items-center gap-2 hover:text-[#d32f2f]"><i class="fas fa-long-arrow-alt-left text-lg"></i> Back to Updates</button>
            <div id="articleHeader"></div>
            <div id="articleBody" class="content-area mt-8 border-t pt-8 text-slate-600 leading-relaxed"></div>
        </div>
    </main>

    <footer class="bg-slate-900 py-16 text-center text-gray-500">
        <div class="max-w-6xl mx-auto px-6">
            <h3 class="text-white font-black italic uppercase tracking-tighter text-xl mb-8">Student Help Club</h3>
            <div class="flex flex-wrap justify-center gap-8 text-[10px] font-bold uppercase tracking-widest mb-10">
                <a href="index.html" class="hover:text-white transition">Home</a>
                <a href="blog.html" class="hover:text-white transition">Updates</a>
                <a href="privacy-policy.html" class="hover:text-white transition">Privacy</a>
                <a href="disclaimer.html" class="hover:text-white transition">Disclaimer</a>
                <a href="about.html" class="hover:text-white transition">About Us</a>
                <a href="contact.html" class="hover:text-white transition">Contact Us</a>
            </div>
            <div class="pt-8 border-t border-white/5">
                <p class="text-[9px] font-medium uppercase tracking-[0.3em] text-gray-600 italic">© 2026 Student Help Club | Founder: Vishal Kumar</p>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADB27lDGXm0g52dEErHUpPse-omSH1pA8",
            authDomain: "ignou-web.firebaseapp.com",
            projectId: "ignou-web",
            storageBucket: "ignou-web.firebasestorage.app",
            messagingSenderId: "854950506403",
            appId: "1:854950506403:web:941a56126a36fd3f9d7416"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allArticles = [];

        // Fail-safe: Force hide loader after 4 seconds
        setTimeout(() => { 
            const loader = document.getElementById('loader');
            if(!loader.classList.contains('hidden')) {
                document.getElementById('loader-text').innerText = "Loading is taking longer than usual...";
                setTimeout(() => loader.classList.add('hidden'), 2000);
            }
        }, 4000);

        async function load() {
            const grid = document.getElementById('articleGrid');
            try {
                const snap = await getDocs(collection(db, "articles"));
                if (snap.empty) {
                    grid.innerHTML = `<p class="text-center py-20 text-slate-400 font-bold text-xs uppercase tracking-widest">No articles found in database.</p>`;
                } else {
                    allArticles = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    allArticles.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    renderList();
                    const params = new URLSearchParams(window.location.search);
                    if(params.get('id')) openFull(params.get('id'));
                }
            } catch (err) {
                console.error("Firebase Error:", err);
                grid.innerHTML = `<div class="text-center py-20 text-red-500 font-black text-[10px]">FAILED TO LOAD DATA. PLEASE REFRESH.</div>`;
            }
            document.getElementById('loader').classList.add('hidden');
        }

        function renderList() {
            const grid = document.getElementById('articleGrid');
            grid.innerHTML = allArticles.map(art => `
                <div class="article-card p-6 flex flex-col md:flex-row gap-5 items-center" onclick="openFull('${art.id}')">
                    <div class="w-12 h-12 bg-red-50 text-[#d32f2f] rounded-2xl flex items-center justify-center text-xl flex-shrink-0"><i class="fas fa-bell"></i></div>
                    <div class="flex-1 text-center md:text-left">
                        <span class="text-[8px] font-black text-[#d32f2f] uppercase tracking-widest bg-red-50 px-2.5 py-1 rounded-full">${art.category || 'Updates'}</span>
                        <h3 class="text-lg md:text-xl font-black text-slate-800 uppercase italic mt-2">${art.title}</h3>
                        <p class="text-gray-400 text-[10px] line-clamp-1 mt-1">${art.shortDesc || 'Click to read more...'}</p>
                    </div>
                </div>
            `).join('');
        }

        window.openFull = (id) => {
            const art = allArticles.find(a => a.id === id);
            if(!art) return;
            document.getElementById('articleHeader').innerHTML = `
                <span class="text-[9px] font-black text-[#d32f2f] uppercase tracking-widest bg-red-50 px-3 py-1 rounded-full">${art.category}</span>
                <h1 class="text-3xl md:text-5xl font-black text-slate-800 uppercase italic mt-6 leading-tight">${art.title}</h1>
                <div class="text-gray-400 text-[9px] font-bold uppercase italic mt-4 italic">Updated: ${art.date || 'Today'} • By Admin</div>
            `;
            document.getElementById('articleBody').innerHTML = art.content;
            document.getElementById('blogListView').classList.add('hidden');
            document.getElementById('fullArticleView').classList.remove('hidden');
            window.scrollTo(0,0);
            window.history.pushState({}, '', `?id=${id}`);
        };

        load();
    </script>
</body>
</html>

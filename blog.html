<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updates | Student Help Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; display: flex; flex-direction: column; min-height: 100vh; }
        .art-card { transition: 0.2s; cursor: pointer; border: 1px solid #f1f5f9; background: white; border-radius: 1.5rem; }
        .art-card:hover { border-color: #d32f2f; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        #loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        footer { margin-top: auto; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-spinner fa-spin text-3xl text-[#d32f2f]"></i></div>

    <nav class="bg-white/80 border-b px-6 py-4 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-[#d32f2f] font-black uppercase text-xs"><i class="fas fa-arrow-left"></i> Store</a>
            <h1 class="text-sm font-black uppercase text-slate-800 italic">Student Help Club</h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-10 w-full">
        <div id="listView">
            <h2 class="text-3xl font-black italic uppercase text-slate-800 mb-8">Latest <span class="text-[#d32f2f]">News</span></h2>
            <div id="grid" class="grid gap-4"></div>
        </div>

        <div id="fullView" class="hidden">
            <button onclick="location.href='blog.html'" class="mb-6 text-slate-400 font-bold uppercase text-[10px]"><i class="fas fa-arrow-left"></i> Back</button>
            <div id="header"></div>
            <div id="body" class="mt-8 border-t pt-8 text-slate-600 leading-relaxed text-sm"></div>
        </div>
    </main>

    <footer class="bg-slate-900 py-12 text-center text-gray-500">
        <div class="flex flex-wrap justify-center gap-6 text-[9px] font-bold uppercase mb-6">
            <a href="index.html">Home</a>
            <a href="privacy-policy.html">Privacy</a>
            <a href="disclaimer.html">Disclaimer</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <p class="text-[8px] uppercase tracking-widest">© 2026 Student Help Club | Vishal Kumar</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADB27lDGXm0g52dEErHUpPse-omSH1pA8",
            authDomain: "ignou-web.firebaseapp.com",
            projectId: "ignou-web",
            storageBucket: "ignou-web.firebasestorage.app",
            messagingSenderId: "854950506403",
            appId: "1:854950506403:web:941a56126a36fd3f9d7416"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let data = [];

        async function init() {
            try {
                const snap = await getDocs(collection(db, "articles"));
                data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                data.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                
                const grid = document.getElementById('grid');
                grid.innerHTML = data.map(item => `
                    <div class="art-card p-5 flex gap-4 items-center" onclick="show('${item.id}')">
                        <div class="w-10 h-10 bg-red-50 text-[#d32f2f] rounded-xl flex items-center justify-center flex-shrink-0"><i class="fas fa-bolt text-sm"></i></div>
                        <div>
                            <h3 class="font-black text-slate-800 uppercase italic text-sm leading-tight">${item.title}</h3>
                            <p class="text-gray-400 text-[10px] mt-1 line-clamp-1">${item.shortDesc || 'Click to read'}</p>
                        </div>
                    </div>
                `).join('');

                const id = new URLSearchParams(location.search).get('id');
                if(id) show(id);
            } catch(e) { document.getElementById('grid').innerHTML = "Check connection."; }
            document.getElementById('loader').classList.add('hidden');
        }

        window.show = (id) => {
            const art = data.find(x => x.id === id);
            if(!art) return;
            document.getElementById('header').innerHTML = `<h1 class="text-3xl font-black text-slate-800 uppercase italic leading-tight">${art.title}</h1><p class="text-gray-400 text-[9px] mt-3 uppercase font-bold tracking-widest">Published on: ${art.date || 'Recent'}</p>`;
            document.getElementById('body').innerHTML = art.content;
            document.getElementById('listView').classList.add('hidden');
            document.getElementById('fullView').classList.remove('hidden');
            window.history.pushState({}, '', `?id=${id}`);
        };

        init();
    </script>
</body>
</html>

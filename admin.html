<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Importer - Student Help Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input { background: transparent; border-bottom: 1px solid #334155; padding: 4px; outline: none; width: 100%; transition: 0.3s; }
        input:focus { border-color: #6366f1; color: white; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="glass-card p-8 rounded-3xl shadow-2xl mb-8 border-l-8 border-indigo-500">
            <h1 class="text-3xl font-extrabold text-white tracking-tight">
                <i class="fas fa-bolt text-yellow-400 mr-2"></i> ChatGPT Bulk PDF Importer
            </h1>
            <p class="text-indigo-300 mt-2 font-medium">Data format: <span class="bg-indigo-900/50 px-2 py-1 rounded text-xs">Code | Name | Course | Year | Session</span></p>
        </div>

        <div class="glass-card p-6 rounded-3xl shadow-xl mb-8">
            <label class="block text-sm font-bold text-gray-400 uppercase mb-3 ml-1">Paste your list here:</label>
            <textarea id="bulkInput" rows="6" 
                class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 text-sm outline-none focus:border-indigo-500 transition shadow-inner"
                placeholder="Example: BPSC-102 | Bhartiya Samvidhan | BAG | 1st Year | July Session"></textarea>
            
            <button onclick="processList()" class="mt-6 bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-500/20 transition-all flex items-center">
                <i class="fas fa- wand-magic-sparkles mr-2"></i> SPLIT & GENERATE ROWS
            </button>
        </div>

        <div class="glass-card rounded-3xl shadow-xl overflow-hidden mb-8">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800/50">
                        <tr>
                            <th class="p-4 text-xs font-bold uppercase text-indigo-400">Code</th>
                            <th class="p-4 text-xs font-bold uppercase text-indigo-400">Subject Name</th>
                            <th class="p-4 text-xs font-bold uppercase text-indigo-400">Course</th>
                            <th class="p-4 text-xs font-bold uppercase text-indigo-400">Year</th>
                            <th class="p-4 text-xs font-bold uppercase text-indigo-400">Session</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-700/50">
                        </tbody>
                </table>
            </div>
            
            <div id="emptyState" class="p-10 text-center text-gray-500 italic">
                Pehle data paste karke "Split" button dabayein...
            </div>

            <div class="p-6 bg-slate-800/30 hidden" id="saveAction">
                <button onclick="uploadToFirebase()" id="finalBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-green-900/20 transition-all">
                    <i class="fas fa-cloud-upload-alt mr-2"></i> SAVE ALL TO FIRESTORE
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your Exact Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyADB27lDGXm0g52dEErHUpPse-omSH1pA8",
            authDomain: "ignou-web.firebaseapp.com",
            projectId: "ignou-web",
            storageBucket: "ignou-web.firebasestorage.app",
            messagingSenderId: "854950506403",
            appId: "1:854950506403:web:941a56126a36fd3f9d7416",
            measurementId: "G-3T3EJEBZW7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Function to split data based on "|"
        window.processList = () => {
            const input = document.getElementById('bulkInput').value;
            if(!input.trim()) { alert("Bhai, kuch paste toh karo!"); return; }

            const lines = input.split('\n');
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 

            lines.forEach(line => {
                if(line.trim() === "") return;

                // Splitting by Pipe (|)
                const parts = line.split('|');
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-700/30 transition";
                tr.innerHTML = `
                    <td class="p-4"><input type="text" value="${parts[0]?.trim() || ''}" class="data-code"></td>
                    <td class="p-4"><input type="text" value="${parts[1]?.trim() || ''}" class="data-name"></td>
                    <td class="p-4"><input type="text" value="${parts[2]?.trim() || ''}" class="data-course"></td>
                    <td class="p-4"><input type="text" value="${parts[3]?.trim() || ''}" class="data-year"></td>
                    <td class="p-4"><input type="text" value="${parts[4]?.trim() || ''}" class="data-session"></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('saveAction').classList.remove('hidden');
        };

        // Function to upload all rows
        window.uploadToFirebase = async () => {
            const btn = document.getElementById('finalBtn');
            const rows = document.querySelectorAll('#tableBody tr');
            let successCount = 0;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> UPLOADING...';

            try {
                for (let row of rows) {
                    const code = row.querySelector('.data-code').value.trim();
                    if(!code) continue;

                    const data = {
                        subjectCode: code,
                        subjectName: row.querySelector('.data-name').value.trim(),
                        courseName: row.querySelector('.data-course').value.trim(),
                        year: row.querySelector('.data-year').value.trim(),
                        session: row.querySelector('.data-session').value.trim(),
                        price: "40",
                        whatsapp: "https://wa.me/916202368003",
                        timestamp: serverTimestamp()
                    };

                    await addDoc(collection(db, "pdf_store"), data);
                    successCount++;
                }
                alert(`Badiya! ${successCount} items database mein save ho gaye.`);
                location.reload();
            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt mr-2"></i> SAVE ALL TO FIRESTORE';
            }
        };
    </script>
</body>
</html>

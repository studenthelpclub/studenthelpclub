<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Student Help Club</title>
    <style>
        * { margin: 0; padding: 0; box-box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f4f7f6; text-align: center; color: #333; padding: 20px; }
        .error-container { max-width: 500px; }
        .error-container h1 { font-size: 120px; color: #007bff; font-weight: 800; line-height: 1; margin-bottom: 10px; }
        .error-container h2 { font-size: 24px; margin-bottom: 15px; color: #222; }
        .error-container p { font-size: 16px; color: #666; margin-bottom: 30px; }
        .btn-home { display: inline-block; padding: 12px 30px; background: #007bff; color: #fff; text-decoration: none; border-radius: 25px; font-weight: 600; box-shadow: 0 4px 15px rgba(0,123,255,0.2); transition: 0.3s; }
        .btn-home:hover { background: #0056b3; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>Sorry, hume ye page nahi mila. Ho sakta hai ye link expire ho gayi ho ya URL me koi galti ho.</p>
        <a href="/" class="btn-home">Go Back to Home</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SHC | Redirecting...</title>
    <script type="text/javascript">
        // Yeh script dynamic URL ko query parameter me convert karke blog.html par bhej degi
        var pathSegmentsToKeep = 0;
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
            '/?p=' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body>
    <p>कृपया प्रतीक्षा करें, री-डायरेक्ट किया जा रहा है...</p>
</body>
</html>

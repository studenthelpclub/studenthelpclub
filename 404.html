<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title id="page-title">Important Updates | Student Help Club</title>
    <meta name="description" id="meta-desc" content="Latest IGNOU updates, solved assignments, and student guides by Student Help Club.">
    <meta name="author" content="Vishal Kumar">
    <meta name="robots" content="index, follow">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; scroll-behavior: smooth; }
        .article-card { transition: all 0.3s ease; border: 1px solid #f1f5f9; background: white; cursor: pointer; border-radius: 1.5rem; }
        .article-card:hover { transform: translateY(-4px); border-color: #d32f2f; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .content-area h2 { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin: 2rem 0 1rem; border-left: 4px solid #d32f2f; padding-left: 12px; }
        #loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-circle-notch fa-spin text-3xl text-[#d32f2f]"></i></div>

    <nav class="bg-white/90 backdrop-blur-md border-b px-4 py-4 sticky top-0 z-[1000]">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="/" class="text-[#d32f2f] font-bold text-[10px] uppercase"><i class="fas fa-arrow-left"></i> Store</a>
            <h1 class="text-md font-black italic text-slate-800 uppercase tracking-tighter">Important Updates</h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8 min-h-[70vh]">
        <div id="blogListView">
            <div class="mb-10 text-center md:text-left">
                <h2 class="text-3xl md:text-4xl font-black italic uppercase text-slate-800 mb-2">IGNOU <span class="text-[#d32f2f]">Updates</span></h2>
            </div>
            <section id="articleGrid" class="grid grid-cols-1 gap-4"></section>
        </div>

        <article id="fullArticleView" class="hidden">
            <button onclick="closeArticle()" class="mb-6 text-slate-500 font-bold uppercase text-[10px] flex items-center gap-2">
                <i class="fas fa-long-arrow-alt-left text-lg"></i> Back to Updates
            </button>
            <header id="articleHeader"></header>
            <div id="articleBody" class="content-area mt-8 border-t pt-8"></div>
            
            <section class="mt-12 bg-gray-50 rounded-[2rem] p-6 border">
                <h3 class="font-black uppercase italic mb-6 text-slate-800">Student Discussion</h3>
                <div class="space-y-3 mb-8">
                    <input type="text" id="comm-name" placeholder="Apna Naam" class="w-full p-3 rounded-xl border text-sm outline-none focus:border-[#d32f2f]">
                    <textarea id="comm-text" rows="3" placeholder="Apna sawal poochhen..." class="w-full p-3 rounded-xl border text-sm outline-none focus:border-[#d32f2f]"></textarea>
                    <button onclick="postComment()" id="commBtn" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold text-[10px] uppercase">Post Comment</button>
                </div>
                <div id="commentList" class="space-y-4"></div>
            </section>
        </article>
    </main>

    <footer class="bg-slate-900 py-12 mt-20 text-center">
        <div class="max-w-5xl mx-auto px-6">
            <h3 class="text-white font-black italic uppercase text-lg mb-8 tracking-tighter">Student Help Club</h3>
            <div class="flex flex-wrap justify-center gap-6 text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-10">
                <a href="/" class="hover:text-white transition">Home</a>
                <a href="/about.html" class="hover:text-white transition">About Us</a>
                <a href="/contact.html" class="hover:text-white transition">Contact</a>
                <a href="/privacy-policy.html" class="hover:text-white transition">Privacy Policy</a>
                <a href="/disclaimer.html" class="hover:text-white transition">Disclaimer</a>
            </div>
            <p class="text-[9px] font-medium uppercase tracking-[0.3em] text-gray-600 italic">© 2026 Student Help Club | Founder: Vishal Kumar</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-lite.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADB27lDGXm0g52dEErHUpPse-omSH1pA8",
            authDomain: "ignou-web.firebaseapp.com",
            projectId: "ignou-web",
            storageBucket: "ignou-web.firebasestorage.app",
            messagingSenderId: "854950506403",
            appId: "1:854950506403:web:941a56126a36fd3f9d7416"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allArticles = [];
        let activeId = null;

        async function fetchArticles() {
            try {
                const snap = await getDocs(collection(db, "articles"));
                allArticles = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderList();
                checkURL();
            } catch (e) { console.error(e); }
            document.getElementById('loader').classList.add('hidden');
        }

        function renderList() {
            const grid = document.getElementById('articleGrid');
            grid.innerHTML = allArticles.map(art => `
                <div class="article-card p-5 flex gap-4 items-center" onclick="openArticle('${art.id}')">
                    <div class="w-12 h-12 bg-red-50 rounded-xl flex items-center justify-center text-[#d32f2f] shrink-0"><i class="fas fa-file-alt"></i></div>
                    <div class="text-left">
                        <h3 class="text-sm font-bold text-slate-800 uppercase italic">${art.title}</h3>
                    </div>
                </div>
            `).join('');
        }

        window.openArticle = async (id) => {
            const art = allArticles.find(a => a.id === id);
            if(!art) return;
            activeId = id;
            
            document.title = `${art.title} | Student Help Club`;
            const metaDesc = document.getElementById('meta-desc');
            if(art.shortDesc) metaDesc.setAttribute("content", art.shortDesc);

            document.getElementById('articleHeader').innerHTML = `
                <span class="text-[9px] font-bold text-[#d32f2f] uppercase tracking-widest bg-red-50 px-3 py-1 rounded-full">${art.category || 'Updates'}</span>
                <h1 class="text-2xl md:text-4xl font-black text-slate-800 uppercase italic mt-4">${art.title}</h1>
            `;
            document.getElementById('articleBody').innerHTML = art.content;
            document.getElementById('blogListView').classList.add('hidden');
            document.getElementById('fullArticleView').classList.remove('hidden');
            
            // --- NEW CLEAN URL PUSH ---
            window.history.pushState({id: id}, art.title, `/blog/${id}`);
            loadComments(id);
            window.scrollTo(0,0);
        };

        window.closeArticle = () => {
            document.title = "Important Updates | Student Help Club";
            document.getElementById('blogListView').classList.remove('hidden');
            document.getElementById('fullArticleView').classList.add('hidden');
            window.history.pushState({}, '', '/blog.html');
            window.scrollTo(0,0);
        };

        async function loadComments(id) {
            const list = document.getElementById('commentList');
            list.innerHTML = "<p class='text-xs italic text-gray-400'>Loading...</p>";
            try {
                const q = query(collection(db, "comments"), where("articleId", "==", id));
                const snap = await getDocs(q);
                let html = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    html += `<div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                        <p class="text-[10px] font-bold text-slate-800 uppercase">${d.name}</p>
                        <p class="text-xs text-slate-500 mt-1">${d.text}</p>
                    </div>`;
                });
                list.innerHTML = html || "<p class='text-xs italic text-gray-400'>No comments yet.</p>";
            } catch(e) { list.innerHTML = ""; }
        }

        window.postComment = async () => {
            const n = document.getElementById('comm-name').value.trim();
            const t = document.getElementById('comm-text').value.trim();
            if(!n || !t) return alert("Details bharein!");
            try {
                await addDoc(collection(db, "comments"), {
                    articleId: activeId, name: n, text: t, timestamp: new Date()
                });
                document.getElementById('comm-text').value = "";
                loadComments(activeId);
            } catch(e) { alert("Error!"); }
        };

        // --- NEW CLEAN URL CHECK ---
        function checkURL() {
            const pathArray = window.location.pathname.split('/');
            // Agar URL me /blog/ ke baad kuch likha hai, toh use ID maan lo
            if (pathArray.includes('blog') && pathArray[pathArray.length - 1] !== 'blog' && pathArray[pathArray.length - 1] !== 'blog.html') {
                const id = pathArray[pathArray.length - 1];
                if(id) openArticle(id);
            }
        }

        fetchArticles();
    </script>
</body>
</html>

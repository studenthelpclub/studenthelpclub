<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-adsense-account" content="ca-pub-7332493779076670">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WKEZF1XEMF"></script>

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WKEZF1XEMF');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title id="dynamic-title">IGNOU Solved Assignments PDF | Student Help Club</title>
    <meta name="description" id="dynamic-desc" content="Download verified IGNOU Solved Assignments. High-quality PDF solutions categorized by course.">
    <meta name="author" content="Vishal Kumar - Student Help Club">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7332493779076670" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; scroll-behavior: smooth; }
        .hero-banner { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .card-shc { border: 1px solid #f1f5f9; transition: 0.3s; background: white; }
        .card-shc:hover { border-color: #d32f2f; transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .cart-sheet { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; background: white; z-index: 2000; box-shadow: -10px 0 50px rgba(0,0,0,0.1); transition: 0.5s ease; }
        .cart-sheet.active { right: 0; }
        .course-header { border-left: 5px solid #d32f2f; padding-left: 15px; margin-bottom: 2rem; margin-top: 4rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="antialiased">

    <div id="loader" class="fixed inset-0 bg-white z-[3000] flex items-center justify-center">
        <div class="flex flex-col items-center">
            <i class="fas fa-circle-notch fa-spin text-4xl text-[#d32f2f] mb-4"></i>
            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">Loading Categories...</p>
        </div>
    </div>

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-[1000] border-b px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-black italic tracking-tighter uppercase">Student <span class="text-[#d32f2f]">Help</span> Club</a>
            <button onclick="toggleCart()" class="relative p-2 text-slate-800">
                <i class="fas fa-shopping-bag text-xl"></i>
                <span id="cartCount" class="absolute -top-1 -right-1 bg-[#d32f2f] text-white text-[8px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
            </button>
        </div>
    </nav>

    <section class="hero-banner py-12 px-6 text-center text-white">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-3xl md:text-5xl font-black italic uppercase mb-6">Subject <span class="text-slate-400">Catalog</span></h1>
            <div class="relative max-w-xl mx-auto">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Search Subject Code..." class="w-full bg-white/10 border border-white/20 rounded-2xl py-4 pl-14 pr-6 outline-none focus:bg-white focus:text-slate-900 transition-all text-sm font-bold">
            </div>
        </div>
    </section>

    <main id="mainContainer" class="max-w-7xl mx-auto px-6 py-10">
        </main>

    <div id="cartSheet" class="cart-sheet flex flex-col">
        <div class="p-8 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-black italic uppercase text-slate-800 text-sm">Cart Selection</h3>
            <button onclick="toggleCart()" class="text-slate-400"><i class="fas fa-times"></i></button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-8 border-t">
            <div class="flex justify-between mb-4">
                <span class="text-[10px] font-black uppercase text-slate-400">Grand Total</span>
                <span class="font-black text-xl text-slate-800 italic">₹<span id="subtotal">0.00</span></span>
            </div>
            <button onclick="checkoutWA()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp"></i> Buy via WhatsApp
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADB27lDGXm0g52dEErHUpPse-omSH1pA8",
            authDomain: "ignou-web.firebaseapp.com",
            projectId: "ignou-web",
            storageBucket: "ignou-web.firebasestorage.app",
            messagingSenderId: "854950506403",
            appId: "1:854950506403:web:941a56126a36fd3f9d7416"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allData = [];
        let cart = JSON.parse(localStorage.getItem('shc_v2025')) || [];

        async function load() {
            try {
                const snap = await getDocs(collection(db, "pdf_store"));
                allData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCategorized(allData);
            } catch (e) { console.error(e); }
            document.getElementById('loader').classList.add('hidden');
            updateCartUI();
        }

        function renderCategorized(data) {
            const container = document.getElementById('mainContainer');
            container.innerHTML = "";
            
            // Grouping data by Course Name (e.g. BAG, BCA)
            const groups = data.reduce((acc, obj) => {
                const key = obj.courseName || 'Other Courses';
                if (!acc[key]) acc[key] = [];
                acc[key].push(obj);
                return acc;
            }, {});

            if(Object.keys(groups).length === 0) {
                container.innerHTML = `<p class="text-center py-20 text-slate-400 uppercase font-black text-xs">No subjects found.</p>`;
                return;
            }

            for (const course in groups) {
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="course-header">
                        <h2 class="text-2xl font-black italic uppercase text-slate-800">${course} <span class="text-[#d32f2f]">Assignments</span></h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                        ${groups[course].map(sub => {
                            const mrp = Number(sub.price) + 20;
                            return `
                            <div class="card-shc p-8 rounded-[2.5rem] flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between items-start mb-6">
                                        <span class="text-[9px] font-black text-[#d32f2f] uppercase tracking-widest bg-red-50 px-3 py-1 rounded-full">${sub.session || '2025'}</span>
                                        <div class="text-right">
                                            <span class="text-[10px] text-slate-400 line-through block">₹${mrp}</span>
                                            <span class="font-black italic text-slate-800 text-lg">₹${sub.price}</span>
                                        </div>
                                    </div>
                                    <h3 class="text-xl font-black text-slate-800 uppercase italic mb-2">${sub.subjectCode}</h3>
                                    <p class="text-gray-500 text-xs font-medium italic mb-6 line-clamp-2">${sub.subjectName}</p>
                                </div>
                                <button onclick="add('${sub.id}')" class="w-full border-2 border-slate-900 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest hover:bg-slate-900 hover:text-white transition-all">Add to Selection</button>
                            </div>`;
                        }).join('')}
                    </div>
                `;
                container.appendChild(section);
            }
        }

        window.filterData = () => {
            const term = document.getElementById('searchInput').value.toUpperCase();
            const filtered = allData.filter(s => s.subjectCode.toUpperCase().includes(term) || s.subjectName.toUpperCase().includes(term));
            renderCategorized(filtered);
            if(term.length > 2) document.title = `${term} Solved PDF | Student Help Club`;
        };

        window.add = (id) => {
            const item = allData.find(s => s.id === id);
            if(!cart.some(c => c.id === id)) {
                cart.push(item);
                localStorage.setItem('shc_v2025', JSON.stringify(cart));
                updateCartUI();
                toggleCart();
            }
        };

        function updateCartUI() {
            const body = document.getElementById('cartItems');
            const total = cart.reduce((acc, curr) => acc + (Number(curr.price) || 0), 0);
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('subtotal').innerText = total.toFixed(2);
            body.innerHTML = cart.length ? cart.map((c, i) => `
                <div class="bg-slate-50 p-4 rounded-2xl border flex justify-between items-center">
                    <div>
                        <h4 class="font-black text-[10px] text-slate-800 uppercase italic">${c.subjectCode}</h4>
                        <p class="text-[8px] font-bold text-slate-400 uppercase">Price: ₹${c.price}</p>
                    </div>
                    <button onclick="removeItem(${i})" class="text-red-400 hover:text-red-600 transition"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('') : `<p class="text-center py-10 opacity-30 text-[10px] font-black uppercase">Empty</p>`;
        }

        window.removeItem = (i) => {
            cart.splice(i, 1);
            localStorage.setItem('shc_v2025', JSON.stringify(cart));
            updateCartUI();
        };

        window.toggleCart = () => document.getElementById('cartSheet').classList.toggle('active');

        window.checkoutWA = () => {
            if(!cart.length) return alert("Empty Selection!");
            let msg = `*OFFICIAL ORDER - STUDENT HELP CLUB*%n`;
            msg += `------------------------------------------%n`;
            msg += `*Customer Inquiry From Store Page*%n`;
            msg += `------------------------------------------%n`;
            cart.forEach((c, i) => {
                msg += `*${i+1}.* Subject: *${c.subjectCode}*%n`;
                msg += `   Price: ₹${c.price}%n%n`;
            });
            msg += `------------------------------------------%n`;
            msg += `*Total Amount:* ₹${document.getElementById('subtotal').innerText}%n`;
            msg += `------------------------------------------%n`;
            msg += `_Please provide payment details to deliver my PDF._`;
            window.location.href = `https://wa.me/919776986830?text=${msg}`;
        };

        load();
    </script>
</body>
</html>

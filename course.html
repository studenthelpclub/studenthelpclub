<body class="light-theme">

    <nav class="shc-navbar">
        <a href="index.html" class="shc-brand-link">
            <div class="shc-brand animated-brand">
                <img src="shc-logo.jpg" alt="Student Help Club Logo" class="shc-logo-img">
                <div class="shc-logo-text">Student <span>Help Club</span></div>
            </div>
        </a>

        <div class="header-search-container">
            <input type="text" id="headerSearch" placeholder="Search code..." onkeyup="searchSubject()">

            <div class="shc-cart-trigger" onclick="openCart()" title="View Selection">

        </div>

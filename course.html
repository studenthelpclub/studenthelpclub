<!DOCTYPE html>
<html lang="hi">
<head>

    <title>IGNOU Solved Assignments PDF | Student Help Club</title>
    <meta name="description" content="Download year-wise IGNOU Solved Assignments for 2025-26. High-quality PDF solutions. Instant delivery by Student Help Club.">
    <meta name="keywords" content="IGNOU Solved Assignment PDF, IGNOU 1st Year Assignment, Student Help Club Solutions">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; -webkit-font-smoothing: antialiased; }
        .back-link { transition: 0.2s; color: #64748b; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }
        .back-link:hover { color: #d32f2f; }
        .course-badge { background: #d32f2f; color: white; padding: 6px 20px; border-radius: 10px; font-size: 14px; font-weight: 900; text-transform: uppercase; box-shadow: 0 4px 10px rgba(211, 47, 47, 0.2); }
        .cart-sheet { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; background: white; z-index: 5000; transition: 0.3s ease; box-shadow: -10px 0 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .cart-sheet.active { right: 0; }
        .subject-card { background: white; border-radius: 16px; border: 1px solid #f1f5f9; padding: 18px; transition: 0.2s; }
        .subject-card:hover { border-color: #d32f2f; transform: translateY(-3px); }
        .year-indicator { border-left: 4px solid #d32f2f; padding-left: 12px; margin-bottom: 24px; font-size: 20px; font-weight: 800; color: #1e293b; }
        #loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .cart-item-box { border: 1px dotted #ccc; padding: 8px; font-size: 9px; background: white; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-spinner fa-spin text-xl text-[#d32f2f]"></i></div>

    <nav class="bg-white/90 backdrop-blur-md border-b sticky top-0 z-[1000] px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="back-link flex items-center gap-2">
                <i class="fas fa-arrow-left text-[10px]"></i> Home
            </a>
            <div class="flex items-center">
                <span class="course-badge" id="navCourseName">Course</span>
            </div>
            <div onclick="toggleCart()" class="relative cursor-pointer bg-gray-50 p-2.5 rounded-xl border">
                <i class="fas fa-shopping-bag text-[#d32f2f]"></i>
                <span id="cartCount" class="absolute -top-1 -right-1 bg-[#d32f2f] text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div id="yearContent"></div>
        <div id="noData" class="text-center py-20 text-gray-300 font-bold italic hidden uppercase tracking-widest">No Subjects found.</div>

        <section class="mt-20 py-12 border-t border-gray-100">
            <h2 class="text-2xl font-black italic text-slate-800 mb-6 uppercase tracking-tighter">Premium Solved <span class="text-[#d32f2f]">Assignment PDFs</span></h2>
            <p class="text-gray-500 text-sm leading-relaxed mb-6">Expert verified content for July 2025 and January 2026 session. High-quality solutions guaranteed.</p>
        </section>
    </main>

    <footer class="bg-[#0c0c0c] text-white py-10 px-8 rounded-t-[2rem]">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <h4 class="text-lg font-black text-[#d32f2f] italic uppercase">Student Help Club</h4>
            <div class="flex gap-6 text-xl">
                <a href="https://wa.me/916202368003" class="hover:text-green-500 transition"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.youtube.com/@vishalhelpclub" class="hover:text-red-600 transition"><i class="fab fa-youtube"></i></a>
                <a href="https://t.me/studenthelpclub" class="hover:text-blue-500 transition"><i class="fab fa-telegram-plane"></i></a>
            </div>
            <p class="text-[9px] text-gray-700 uppercase">© 2026 Student Help Club | Managed by Vishal</p>
        </div>
    </footer>

    <div id="cartSheet" class="cart-sheet">
        <div class="p-6 flex justify-between items-center border-b"><h3 class="font-bold italic">My Cart</h3><button onclick="toggleCart()" class="text-2xl text-gray-300">&times;</button></div>
        <div id="cartBody" class="flex-1 overflow-y-auto p-6 space-y-8"></div>
        <div class="p-6 border-t bg-white">
            <div class="flex justify-between font-black text-lg mb-6"><span>Total:</span><span class="text-[#d32f2f]">₹<span id="subtotal">0.00</span></span></div>
            <button onclick="checkoutWA()" class="w-full bg-black text-white py-4 rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-xl transition active:scale-95">Checkout WhatsApp</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADB27lDGXm0g52dEErHUpPse-omSH1pA8",
            authDomain: "ignou-web.firebaseapp.com",
            projectId: "ignou-web",
            storageBucket: "ignou-web.firebasestorage.app",
            messagingSenderId: "854950506403",
            appId: "1:854950506403:web:941a56126a36fd3f9d7416"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let cart = JSON.parse(localStorage.getItem('shc_lite_v6')) || [];
        let fetchedData = [];

        async function initCourse() {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type') || 'BAG';
            document.getElementById('navCourseName').innerText = type;

            try {
                const cached = sessionStorage.getItem(`shc_course_${type}`);
                if (cached) { fetchedData = JSON.parse(cached); } 
                else {
                    const q = query(collection(db, "pdf_store"), where("courseName", "==", type));
                    const snap = await getDocs(q);
                    fetchedData = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    sessionStorage.setItem(`shc_course_${type}`, JSON.stringify(fetchedData));
                }

                document.getElementById('loader').style.display = 'none';

                if(fetchedData.length === 0) {
                    document.getElementById('noData').classList.remove('hidden');
                    return;
                }

                const mainGrid = document.getElementById('yearContent');
                [1, 2, 3].forEach(year => {
                    const filter = fetchedData.filter(p => parseInt(p.year) == year || (year == 1 && !p.year));
                    if(filter.length > 0) {
                        const sec = document.createElement('section');
                        sec.className = "mb-16";
                        sec.innerHTML = `<h3 class="year-indicator italic text-slate-800 uppercase">${year}${year==1?'st':year==2?'nd':'rd'} Year</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                ${filter.map(p => `
                                    <div class="subject-card flex flex-col justify-between">
                                        <div>
                                            <div class="flex justify-between items-start mb-3">
                                                <span class="text-[8px] font-bold bg-gray-50 text-gray-400 px-2 py-1 rounded uppercase tracking-tighter">Code: ${p.subjectCode}</span>
                                                <span class="font-black text-sm text-slate-900">₹50</span>
                                            </div>
                                            <h4 class="text-sm font-black text-slate-800 uppercase mb-4 leading-tight">${p.subjectCode}</h4>
                                            <div class="space-y-2 mb-4">
                                                <select id="med-${p.id}" class="w-full bg-gray-50 p-2 rounded-lg text-[10px] font-bold outline-none">
                                                    <option value="Hindi Medium">Hindi Medium</option>
                                                    <option value="English Medium">English Medium</option>
                                                </select>
                                                <select id="ses-${p.id}" class="w-full bg-gray-50 p-2 rounded-lg text-[10px] font-bold outline-none">
                                                    <option value="July 2025 - July 2026">July 2025 - July 2026</option>
                                                    <option value="January 2026 - January 2026">Jan 2026 - Jan 2026</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="flex gap-2">
                                            <button onclick="addToCart('${p.id}')" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold text-[9px] uppercase">Add</button>
                                            <button onclick="buyNow('${p.id}')" class="flex-[2] bg-slate-900 text-white py-3 rounded-xl font-bold text-[9px] uppercase shadow-lg transition active:scale-95">Buy Now</button>
                                        </div>
                                    </div>`).join('')}</div>`;
                        mainGrid.appendChild(sec);
                    }
                });
                updateUI();
            } catch (e) { console.error(e); }
        }

        window.addToCart = (id) => {
            const p = fetchedData.find(x => x.id === id);
            const med = document.getElementById(`med-${id}`).value;
            const ses = document.getElementById(`ses-${id}`).value;
            if(!cart.find(c => c.id === id && c.medium === med && c.session === ses)) {
                cart.push({...p, medium: med, session: ses, price: 50});
                localStorage.setItem('shc_lite_v6', JSON.stringify(cart));
                updateUI();
            }
        };

        window.buyNow = (id) => {
            const p = fetchedData.find(x => x.id === id);
            const med = document.getElementById(`med-${id}`).value;
            const ses = document.getElementById(`ses-${id}`).value;
            const invId = "SHC-" + Math.floor(1000 + Math.random() * 9000);
            const msg = `*--- STUDENT HELP CLUB ---*\n*NEW ORDER REQUEST*\n--------------------------\n*Invoice:* #${invId}\n*Code:* ${p.subjectCode}\n*Medium:* ${med}\n*Session:* ${ses}\n*Price:* ₹50\n--------------------------\n_Hi Vishal, please share payment details._`;
            window.open(`https://wa.me/916202368003?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.updateUI = () => {
            document.getElementById('cartCount').innerText = cart.length;
            const body = document.getElementById('cartBody');
            let total = cart.reduce((acc, curr) => acc + curr.price, 0);
            body.innerHTML = cart.length ? "" : "<p class='text-center py-10 opacity-20 italic font-bold uppercase'>Empty</p>";
            cart.forEach((c, i) => {
                body.innerHTML += `
                <div class="relative bg-gray-50 p-4 rounded-xl border">
                    <h4 class="font-bold text-[11px] mb-2 text-slate-800">${c.subjectCode}</h4>
                    <div class="cart-item-box">
                        <div class="flex justify-between font-bold text-[#d32f2f]"><span>${c.medium}</span></div>
                        <div class="flex justify-between"><span>${c.session}</span></div>
                    </div>
                    <button onclick="rem(${i})" class="absolute -top-2 -right-2 bg-red-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] shadow-lg">&times;</button>
                </div>`;
            });
            document.getElementById('subtotal').innerText = total.toFixed(2);
        };

        window.rem = (i) => { cart.splice(i, 1); localStorage.setItem('shc_lite_v6', JSON.stringify(cart)); updateUI(); };
        window.toggleCart = () => document.getElementById('cartSheet').classList.toggle('active');
        
        window.checkoutWA = () => {
            if(!cart.length) return;
            const invId = "SHC-" + Math.floor(1000 + Math.random() * 9000);
            let msg = `*--- STUDENT HELP CLUB ---*\n*OFFICIAL INVOICE #${invId}*\n--------------------------\n`;
            cart.forEach((c, i) => { msg += `${i + 1}. ${c.subjectCode} (${c.medium}) | ${c.session}\n`; });
            msg += `--------------------------\n*Total: ₹${document.getElementById('subtotal').innerText}*\n\n_Hi, I want to place this order._`;
            window.open(`https://wa.me/916202368003?text=${encodeURIComponent(msg)}`, '_blank');
            setTimeout(() => { cart = []; localStorage.removeItem('shc_lite_v6'); updateUI(); document.getElementById('cartSheet').classList.remove('active'); }, 1500);
        };

        initCourse();
    </script>
</body>
</html>

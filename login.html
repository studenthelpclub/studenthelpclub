    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Student Help Club</title>

    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; }
    </style>
    <link rel="manifest" href="site.webmanifest">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

</head>
<body class="h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-slate-800 p-10 rounded-[2.5rem] border border-slate-700 shadow-2xl">
        <div class="text-center mb-8">
            <img src="shc-logo.jpg" class="w-16 h-16 mx-auto rounded-2xl mb-4 shadow-lg">
            <h2 class="text-2xl font-black text-white italic">ADMIN <span class="text-indigo-500">LOGIN</span></h2>
            <p class="text-slate-400 text-[10px] mt-2 uppercase tracking-[0.2em] font-bold">Secure Access Required</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Admin Email</label>
                <input type="email" id="email" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl text-white outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Password</label>
                <input type="password" id="password" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl text-white outline-none focus:border-indigo-500 transition">
            </div>
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl transition-all mt-4">
                VERIFY & ENTER
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADB27lDGXm0g52dEErHUpPse-omSH1pA8",
            authDomain: "ignou-web.firebaseapp.com",
            projectId: "ignou-web",
            storageBucket: "ignou-web.firebasestorage.app",
            messagingSenderId: "854950506403",
            appId: "1:854950506403:web:941a56126a36fd3f9d7416"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if(!email || !password) { alert("Details dalo bhai!"); return; }
            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "admin.html"; 
            } catch (error) {
                alert("Login Failed: " + error.message);
                btn.innerText = "VERIFY & ENTER";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
